<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Timer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #eee;
    }

    .card {
      background: #16213e;
      border-radius: 2rem;
      padding: 3rem 4rem;
      text-align: center;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
      min-width: 340px;
    }

    h1 {
      font-size: 1.1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #e94560;
      margin-bottom: 2.5rem;
      font-weight: 600;
    }

    .ring-wrapper {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto 2.5rem;
    }

    .ring-svg {
      transform: rotate(-90deg);
      width: 220px;
      height: 220px;
    }

    .ring-bg {
      fill: none;
      stroke: #0f3460;
      stroke-width: 8;
    }

    .ring-progress {
      fill: none;
      stroke: #e94560;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 628.32;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.4s;
    }

    .ring-progress.done {
      stroke: #4ecca3;
    }

    .time-display {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .time {
      font-size: 3.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1;
      color: #f5f5f5;
      font-variant-numeric: tabular-nums;
    }

    .phase-label {
      margin-top: 0.4rem;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #8892b0;
    }

    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    button {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s, background 0.2s;
    }

    button:active { transform: scale(0.96); }

    #btn-start {
      background: #e94560;
      color: #fff;
      box-shadow: 0 4px 20px rgba(233,69,96,0.4);
    }

    #btn-start:hover { background: #ff5c78; box-shadow: 0 4px 28px rgba(233,69,96,0.6); }
    #btn-start.running { background: #f5a623; box-shadow: 0 4px 20px rgba(245,166,35,0.4); }
    #btn-start.running:hover { background: #ffbb44; }
    #btn-start.finished { background: #4ecca3; box-shadow: 0 4px 20px rgba(78,204,163,0.4); }

    #btn-reset {
      background: transparent;
      color: #8892b0;
      border: 2px solid #0f3460;
    }

    #btn-reset:hover { border-color: #8892b0; color: #eee; }

    .sessions {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #4a5568;
      letter-spacing: 0.05em;
    }

    .sessions span {
      color: #e94560;
      font-weight: 700;
    }

    .dots {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
      margin-top: 0.6rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #0f3460;
      transition: background 0.3s;
    }

    .dot.filled { background: #e94560; }

    .duration-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .duration-row label {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8892b0;
    }

    #custom-minutes {
      width: 64px;
      padding: 0.4rem 0.6rem;
      background: #0f3460;
      border: 2px solid #0f3460;
      border-radius: 0.5rem;
      color: #f5f5f5;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    #custom-minutes::-webkit-inner-spin-button,
    #custom-minutes::-webkit-outer-spin-button { -webkit-appearance: none; }

    #custom-minutes:focus { border-color: #e94560; }
    #custom-minutes:disabled { opacity: 0.4; cursor: not-allowed; }

    .duration-row span {
      font-size: 0.8rem;
      color: #4a5568;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Pomodoro</h1>

  <div class="duration-row">
    <label for="custom-minutes">Minutes</label>
    <input id="custom-minutes" type="number" min="1" max="99" value="25" />
    <span>min</span>
  </div>

  <div class="ring-wrapper">
    <svg class="ring-svg" viewBox="0 0 220 220">
      <circle class="ring-bg" cx="110" cy="110" r="100" />
      <circle class="ring-progress" id="ring" cx="110" cy="110" r="100" />
    </svg>
    <div class="time-display">
      <div class="time" id="display">25:00</div>
      <div class="phase-label" id="phase">Focus</div>
    </div>
  </div>

  <div class="controls">
    <button id="btn-start">Start</button>
    <button id="btn-reset">Reset</button>
  </div>

  <div class="sessions">
    Sessions completed: <span id="session-count">0</span>
    <div class="dots" id="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>

<script>
  const CIRCUMFERENCE = 2 * Math.PI * 100;

  let total     = 25 * 60;
  let remaining = total;
  let interval  = null;
  let sessions  = 0;

  const display       = document.getElementById('display');
  const ring          = document.getElementById('ring');
  const btnStart      = document.getElementById('btn-start');
  const btnReset      = document.getElementById('btn-reset');
  const phaseEl       = document.getElementById('phase');
  const countEl       = document.getElementById('session-count');
  const dotsEl        = document.getElementById('dots');
  const minutesInput  = document.getElementById('custom-minutes');

  function fmt(secs) {
    const m = String(Math.floor(secs / 60)).padStart(2, '0');
    const s = String(secs % 60).padStart(2, '0');
    return `${m}:${s}`;
  }

  function updateRing(secs) {
    const progress = secs / total;
    ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
  }

  function updateDots() {
    const dots = dotsEl.querySelectorAll('.dot');
    dots.forEach((d, i) => d.classList.toggle('filled', i < sessions % 4));
  }

  function playChime() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
      notes.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.22;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.35, t + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
        osc.start(t);
        osc.stop(t + 0.65);
      });
    } catch(e) { /* audio not available */ }
  }

  function tick() {
    remaining--;
    display.textContent = fmt(remaining);
    updateRing(remaining);

    if (remaining <= 0) {
      clearInterval(interval);
      interval = null;
      sessions++;
      countEl.textContent = sessions;
      updateDots();
      display.textContent = '00:00';
      phaseEl.textContent = 'Complete!';
      btnStart.textContent = 'Restart';
      btnStart.classList.remove('running');
      btnStart.classList.add('finished');
      ring.classList.add('done');
      playChime();
      document.title = '✅ Done! — Pomodoro';
    } else {
      document.title = `${fmt(remaining)} — Pomodoro`;
    }
  }

  btnStart.addEventListener('click', () => {
    if (interval) {
      // Pause
      clearInterval(interval);
      interval = null;
      btnStart.textContent = 'Resume';
      btnStart.classList.remove('running');
      phaseEl.textContent = 'Paused';
    } else {
      // Start / Resume / Restart
      if (remaining <= 0) {
        remaining = total;
        updateRing(total);
        ring.classList.remove('done');
      }
      interval = setInterval(tick, 1000);
      btnStart.textContent = 'Pause';
      btnStart.classList.add('running');
      btnStart.classList.remove('finished');
      phaseEl.textContent = 'Focus';
    }
  });

  btnReset.addEventListener('click', () => {
    clearInterval(interval);
    interval = null;
    remaining = total;
    display.textContent = fmt(total);
    updateRing(total);
    ring.classList.remove('done');
    btnStart.textContent = 'Start';
    btnStart.classList.remove('running', 'finished');
    phaseEl.textContent = 'Focus';
    minutesInput.disabled = false;
    document.title = 'Pomodoro Timer';
  });

  minutesInput.addEventListener('change', () => {
    if (interval) return;
    const mins = Math.max(1, Math.min(99, parseInt(minutesInput.value, 10) || 25));
    minutesInput.value = mins;
    total = mins * 60;
    remaining = total;
    display.textContent = fmt(total);
    updateRing(total);
    ring.classList.remove('done');
    btnStart.textContent = 'Start';
    btnStart.classList.remove('running', 'finished');
    phaseEl.textContent = 'Focus';
  });

  btnStart.addEventListener('click', () => {
    minutesInput.disabled = true;
  }, { capture: true });

  // Init
  updateRing(total);
</script>
</body>
</html>
